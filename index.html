<!doctype html>
<html lang="en">
<head>
  <base href="/">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="Description" content="Crest Golf League">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      height: 100%;
    }
  
    body {
      background-image: url("https://images.squarespace-cdn.com/content/v1/54a65094e4b0631d0c489ac8/30bf8722-6db4-4f40-be88-76d9d06cdb0c/Golden+Hour1-5.jpg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      position: relative;
    }
  
    /* overlay for opacity */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.75); /* LIGHT MODE */
      z-index: 0;
    }
  
    @media (prefers-color-scheme: dark) {
      body::before {
        background: rgba(0, 0, 0, 0.6); /* DARK MODE */
      }
    }
  
    crest-app {
      position: relative;
      z-index: 1; /* ensures content is above overlay */
      display: block;
    }
  </style>
  
  <title>Crest Golf League</title>

  <script type="module" src="./elements/crest-app.js"></script>
</head>

<body>
  <crest-app></crest-app>
</body>
</html>
