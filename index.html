<!doctype html>
<html lang="en">
<head>
  <base href="/">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="Description" content="Crest Golf League">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
  
    crest-app {
      width: 100%;
      height: 100%;
      display: block;
    }
  
    :root {
      --bg-color: #f5f5f5;
      --text-color: #111;
      --card-bg: #ffffff;
    }
  
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #121212;
        --text-color: #ffffff;
        --card-bg: #1e1e1e;
      }
    }
  
    body {
      background-color: var(--bg-color);
      color: var(--text-color);
    }
  </style>

  <title>Crest Golf League</title>

  <script type="module" src="./elements/crest-app.js"></script>
</head>

<body>
  <crest-app></crest-app>
</body>
</html>
